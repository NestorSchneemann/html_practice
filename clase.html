<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .contenedor{
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contenido{
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            width: 600px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, blue, green);
            border: 5px solid black;
            padding: 20px;
        }

        .cajas{
            width: 250px;
            height: 150px;
            border: 15px solid black;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 15px;
        }

        #primera{
            align-items: left;
            font-family: Arial, Helvetica, sans-serif;
        }

        #segunda{
            align-items: right;
            font-family: 'Courier New', Courier, monospace;
        }

    </style>

</head>
<body>
    
    <div class="contenedor">
        <div class="contenido">
            <div class="cajas" id="primera">Primera Caja</div>
            <div class="cajas" id="segunda">Segunda Caja</div>
        </div>
    </div>

</body>
</html>
