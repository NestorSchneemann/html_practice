<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primer formulario</title>

    <style>

        body {
            font-family: 'Times New Roman', Times, serif;
            background: #f4f4f4;
        }

        form{
            width: 350px;
            margin: 50px auto;
            padding: 20px;
            background: wheat;
            border-radius: 10px;
            box-shadow: 0 0 10px #333;
        }

        input, textarea{
            width: 93%;
            padding: 8px;
            margin: 5px 0 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-shadow: 0 0 6px #333;
        }

        button{
            width: 98%;
            padding: 7px;
            border: none;
            border-radius: 5px;
            background: #333;
            color: white;
            cursor: cell;
            box-shadow: 0 10px 15px aliceblue;
        }

        button:hover{
            background: #555;
        }

        h2{
            text-align: center;
        }
        
    </style>
</head>
<body>
    
    <h2>Formulario</h2>

    <form>
        <label>Nombre:</label><br>
        <input type="text"><br><br>

        <label>Email:</label><br>
        <input type="text"><br><br>

        <button type="submit">Enviar</button>
    </form>
</body>
</html>
