<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primer formulario</title>

    <style>

        * {font-size: 12px;}

        body {
            font-family:Verdana, Geneva, Tahoma, sans-serif;
            background: #AD4394;
        }

        form{
            width: 400px;
            margin: 50px auto;
            padding: 30px;
            padding-bottom: 10px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px #333;
        }

        input, textarea{
            width: 93%;
            padding: 8px;
            margin: 5px 0 15px;
            border: 1px solid #AD4394;
            border-radius: 6px;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 10px;
        }

        button{
            width: 98%;
            padding-top: 15px;
            padding-bottom: 10px;
            border: none;
            border-radius: 5px;
            background:#AD4394;
            color:white;
            cursor: cell;
            box-shadow: 0 10px 15px aliceblue;
            margin-top: 15px;
        }

        button:hover{
            background: #555;
        }

        h2{
            text-align: center;
            font-size: 30px;
            font-weight: bolder;
            color:#AD4394;
        }
        
        .descripcion{
            font-size: 13.5px;
            margin-bottom: 35px;
            margin-top: 40px;
        }

        .final{
            margin-bottom: 20px;
            margin-top: 30px;
            font-size: 11px;
        }

        .obligatorio{
            color: #AD4394;
        }
        
    </style>
</head>
<body>
    
    

    <form>
        <h2>Formulario de contacto</h2>

        <p class="descripcion">Escríbenos y en breve nos pondremos en contacto contigo</p>

        <label>Nombre <span class="obligatorio">*</span></label><br>
        <input type="text" placeholder="Escribe tu nombre"><br><br>

        <label>Email <span class="obligatorio">*</span></label><br>
        <input type="text" placeholder="Escribe tu Email"><br><br>

        <label>Teléfono</label><br>
        <input type="text" placeholder="Escribe tu teléfono"><br><br>

        <label>Sitio Web</label><br>
        <input type="text" placeholder="Escribe la URL de tu web"><br><br>

        <label>Asunto <span class="obligatorio">*</span></label><br>
        <input type="text" placeholder="Escribe un asunto"><br><br>

        <label>Mensaje <span class="obligatorio">*</span></label><br>
        <textarea placeholder="Deja aquí tu comentario..." rows="8"></textarea>

        <button type="submit">ENVIAR</button>

        <p class="final"> <span class="obligatorio">*</span> los campos son obligatorios.</p>
    </form>
</body>
</html>
