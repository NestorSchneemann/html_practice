<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi página menos básica</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: right;
            nav a {
                color: white;
                margin: 0 10px;
                text-decoration: none;
            }

            nav a:hover {
                text-decoration: underline;
                background: green;
            }
        }

        main {
            padding: 30px;
            min-height: 70px;
            
        }

        footer{
            text-align: center;
            background: #333;
            color: white;
            padding: 30px;
            font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            font-weight: lighter;
        }

    </style>
</head>
<body>
    
    <header>
        <nav>
            <a href="#">Inicio</a>
            <a href="#">Contactos</a>
            <a href="#">Servicios</a>
        </nav>
    </header>

    <hr>

    <main>
        <h1>Mi página con estilos</h1>
        <p>Esta página si tiene estilos</p>
    </main>

    <hr>

    <footer>
        <p>Los mismos fachos morronguiando</p>
    </footer>
</body>
</html>
